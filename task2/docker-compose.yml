version: '3.8'

services:
  mongo:
    image: mongo:latest
    container_name: chat_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: chat_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/realtime_chat
      - JWT_SECRET=supersecretjwtkey12345
      - FRONTEND_URL=http://localhost
    depends_on:
      - mongo
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: chat_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
  backend_uploads:
