<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Domain Blocked - GlowTracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #020617;
      --card-bg: rgba(15, 23, 42, 0.45);
      --border-color: rgba(255, 255, 255, 0.05);
      --primary: #6366f1;
      --secondary: #f43f5e;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg-color);
      color: #f8fafc;
      min-height: 100/vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 20px;
      height: 100vh;
    }

    /* Background decorative glows */
    .glow-spot-1 {
      position: absolute;
      top: 20%;
      left: 20%;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(244, 63, 94, 0.1) 0%, transparent 70%);
      filter: blur(50px);
      pointer-events: none;
    }

    .glow-spot-2 {
      position: absolute;
      bottom: 20%;
      right: 20%;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, transparent 70%);
      filter: blur(50px);
      pointer-events: none;
    }

    .glass-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 28px;
      padding: 40px;
      max-width: 480px;
      width: 100%;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      text-align: center;
      z-index: 10;
      position: relative;
      animation: scaleUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes scaleUp {
      from {
        opacity: 0;
        transform: scale(0.92);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .icon-container {
      width: 72px;
      height: 72px;
      background: rgba(244, 63, 94, 0.1);
      border: 1px solid rgba(244, 63, 94, 0.2);
      color: var(--secondary);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 24px;
      box-shadow: 0 10px 25px rgba(244, 63, 94, 0.15);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 10px 25px rgba(244, 63, 94, 0.15);
      }
      50% {
        transform: scale(1.05);
        box-shadow: 0 15px 35px rgba(244, 63, 94, 0.25);
      }
    }

    h1 {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
      background: linear-gradient(90deg, #fff, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .blocked-url {
      display: inline-block;
      font-size: 13px;
      font-weight: 700;
      color: #94a3b8;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 6px 16px;
      border-radius: 12px;
      margin-bottom: 24px;
      word-break: break-all;
      max-width: 100%;
    }

    .quote-box {
      border-left: 3px solid var(--primary);
      padding-left: 16px;
      text-align: left;
      margin: 8px 0 32px;
      font-style: italic;
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.6;
    }

    .quote-author {
      display: block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
      margin-top: 6px;
      font-style: normal;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      display: block;
      width: 100%;
      background: linear-gradient(90deg, var(--primary), #818cf8);
      border: none;
      border-radius: 12px;
      padding: 14px;
      color: white;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 4px 14px rgba(99, 102, 241, 0.25);
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:hover {
      opacity: 0.95;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: none;
      color: #cbd5e1;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.08);
      color: white;
    }
  </style>
</head>
<body>
  <div class="glow-spot-1"></div>
  <div class="glow-spot-2"></div>

  <div class="glass-card">
    <div class="icon-container">🛡️</div>
    <h1>Focus Mode Activated</h1>
    <p style="color: #94a3b8; font-size: 14px; margin-bottom: 8px;">The domain you requested is currently blocked:</p>
    <div id="url-display" class="blocked-url">example.com</div>

    <div class="quote-box">
      "Focus is a muscle, and you build it by choosing to avoid distractions and concentrate on what matters."
      <span class="quote-author">— GlowTracker Team</span>
    </div>

    <div class="button-group">
      <button id="go-back-btn" class="btn">Get Back to Work</button>
      <button id="open-dashboard-btn" class="btn btn-secondary">Open SaaS Dashboard</button>
    </div>
  </div>

  <script>
    // Extract blocked URL from query parameters
    const params = new URLSearchParams(window.location.search);
    const url = params.get('url');
    if (url) {
      try {
        const domain = new URL(url).hostname;
        document.getElementById('url-display').innerText = domain;
      } catch (e) {
        document.getElementById('url-display').innerText = url;
      }
    }

    // Go back in history
    document.getElementById('go-back-btn').onclick = () => {
      if (history.length > 1) {
        history.back();
      } else {
        window.close();
      }
    };

    // Open Dashboard
    document.getElementById('open-dashboard-btn').onclick = () => {
      window.open('http://localhost:8080', '_blank');
    };
  </script>
</body>
</html>
