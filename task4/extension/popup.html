<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GlowTracker Popup</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #020617;
      --card-bg: rgba(15, 23, 42, 0.65);
      --border-color: rgba(255, 255, 255, 0.05);
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --secondary: #0ea5e9;
      --rose: #f43f5e;
      --emerald: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 320px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg-color);
      color: #f8fafc;
      overflow-x: hidden;
    }

    .container {
      padding: 20px;
      position: relative;
    }

    /* Glow overlays */
    .glow {
      position: absolute;
      top: -40px;
      right: -40px;
      width: 150px;
      height: 150px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
      filter: blur(20px);
      pointer-events: none;
      z-index: 0;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      position: relative;
      z-index: 10;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: white;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
    }

    .title-text h1 {
      font-size: 14px;
      font-weight: 800;
      letter-style: tracking-tight;
    }

    .title-text p {
      font-size: 9px;
      color: #94a3b8;
      font-weight: 600;
    }

    .glass-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 16px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
      margin-bottom: 16px;
      position: relative;
      z-index: 10;
    }

    /* Forms */
    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #94a3b8;
      margin-bottom: 5px;
    }

    .form-group input {
      width: 100%;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 10px 12px;
      color: white;
      font-size: 12px;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: rgba(99, 102, 241, 0.5);
    }

    .btn {
      width: 100%;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      border: none;
      border-radius: 10px;
      padding: 10px;
      color: white;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:hover {
      opacity: 0.95;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: none;
      color: #cbd5e1;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    /* Dashboard Details */
    .timer-section {
      text-align: center;
      padding: 8px 0;
    }

    .timer-domain {
      font-size: 13px;
      font-weight: 700;
      color: #cbd5e1;
      margin-bottom: 2px;
      word-break: break-all;
    }

    .timer-clock {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(90deg, #fff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .score-bar-bg {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 3px;
      overflow: hidden;
      margin: 8px 0;
    }

    .score-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      border-radius: 3px;
      width: 0%;
      transition: width 0.8s ease-out;
    }

    .score-text {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      font-weight: 600;
      color: #94a3b8;
    }

    .block-control-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: rgba(244, 63, 94, 0.06);
      border: 1px solid rgba(244, 63, 94, 0.12);
      border-radius: 12px;
      margin-bottom: 12px;
      z-index: 10;
      position: relative;
    }

    .block-text {
      font-size: 11px;
      font-weight: 700;
      color: #fda4af;
    }

    /* Toggle Switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(255, 255, 255, 0.1);
      transition: .3s;
      border-radius: 20px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: var(--rose);
    }

    input:checked + .slider:before {
      transform: translateX(16px);
    }

    /* Messages & helpers */
    .error-msg {
      font-size: 11px;
      color: var(--rose);
      margin-bottom: 8px;
      text-align: center;
      font-weight: 600;
      display: none;
    }

    .footer-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      position: relative;
      z-index: 10;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="glow"></div>
    
    <!-- Top Bar -->
    <header>
      <div class="logo-container">
        <div class="logo">⚡</div>
        <div class="title-text">
          <h1>GlowTracker</h1>
          <p id="sub-header">Offline Mode</p>
        </div>
      </div>
      <div id="logout-icon-btn" class="hidden" style="cursor: pointer; opacity: 0.6; font-size: 13px;" title="Sign out">🔒</div>
    </header>

    <!-- Error alert box -->
    <div id="alert-box" class="error-msg"></div>

    <!-- Login Form view -->
    <div id="login-view" class="glass-card">
      <div class="form-group">
        <label for="login-email">Email Address</label>
        <input type="email" id="login-email" placeholder="john@example.com">
      </div>
      <div class="form-group" style="margin-bottom: 16px;">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="••••••••">
      </div>
      <button id="login-btn" class="btn">Sign In</button>
    </div>

    <!-- Dashboard/Tracking stats view -->
    <div id="tracker-view" class="hidden">
      <!-- Current Site Stats -->
      <div class="glass-card">
        <div class="timer-section">
          <p id="current-domain" class="timer-domain">No Active Site</p>
          <div id="current-timer" class="timer-clock">00:00:00</div>
        </div>
        
        <!-- Focus Score meter -->
        <div class="score-text">
          <span>Weekly Focus Score</span>
          <span id="focus-score-pct">0%</span>
        </div>
        <div class="score-bar-bg">
          <div id="focus-score-fill" class="score-bar-fill"></div>
        </div>
      </div>

      <!-- Instant block list card -->
      <div class="block-control-card">
        <span class="block-text">Block Current Website</span>
        <label class="switch">
          <input type="checkbox" id="block-domain-toggle">
          <span class="slider"></span>
        </label>
      </div>

      <!-- Action keys buttons -->
      <div class="footer-actions">
        <button id="open-dashboard-btn" class="btn">SaaS Dashboard</button>
        <button id="sync-now-btn" class="btn btn-secondary" style="width: 42px;" title="Sync Sync Now">🔄</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
